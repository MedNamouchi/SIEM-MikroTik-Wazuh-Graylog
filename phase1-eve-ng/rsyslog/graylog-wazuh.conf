# =============================================================
# rsyslog configuration — Graylog to Wazuh Agent
# =============================================================
# File location: /etc/rsyslog.d/graylog-wazuh.conf
#
# Purpose:
#   Receive syslog messages from Graylog on localhost:514 (TCP)
#   and write them to /var/log/mikrotik.log for Wazuh Agent.
#
# Security note:
#   The listener is bound to 127.0.0.1 implicitly via the
#   Graylog output sending to localhost only.
#   This channel never leaves the machine and cannot be sniffed.
#
# Why rsyslog and not direct Wazuh Agent listener?
#   The Wazuh Agent cannot listen on a network port directly.
#   rsyslog acts as the intermediary: it receives from Graylog
#   and writes to a flat file that the Wazuh Agent reads.
# =============================================================

# Load TCP input module
module(load="imtcp")
input(type="imtcp" port="514")

# Write logs received from localhost to the MikroTik log file
if $fromhost-ip == '127.0.0.1' then /var/log/mikrotik.log
& stop
